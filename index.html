<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16130f">
<title>ASCENT · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grain"></div>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="k">Calisthénie · Escalade</span>
      <h1>ASCENT<span>.</span></h1>
    </div>
    <div class="streak">
      séries enchaînées
      <b id="streak">0</b>
    </div>
  </header>

  <!-- CALENDAR -->
  <section class="view on" id="v-cal">
    <div class="panel">
      <div class="cal-head">
        <button class="navbtn" id="prevM">‹</button>
        <div style="text-align:center">
          <h2 id="monthName">—</h2>
          <span class="yr" id="yearLbl"></span>
        </div>
        <button class="navbtn" id="nextM">›</button>
      </div>
      <div class="dow"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
      <div class="grid" id="grid"></div>
      <div class="legend">
        <span><i style="background:var(--moss)"></i>Fait</span>
        <span><i style="background:var(--gold)"></i>Partiel</span>
        <span><i style="background:var(--rust)"></i>Aujourd'hui</span>
        <span><i style="background:var(--dim)"></i>Repos</span>
      </div>
    </div>
  </section>

  <!-- DAY -->
  <section class="view" id="v-day"></section>

  <!-- JOURNAL -->
  <section class="view" id="v-log"></section>

  <!-- STATS -->
  <section class="view" id="v-stats"></section>

  <!-- PERSO (mes séances) -->
  <section class="view" id="v-cust"></section>
</div>

<!-- GUIDED SESSION -->
<div class="gs" id="gs">
  <div class="gs-top">
    <button class="x" id="gsClose">×</button>
    <span class="prog" id="gsProg">—</span>
    <button class="gs-info" id="gsInfo" aria-label="Repères de l'exercice" style="visibility:hidden">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5v.5"/></svg></button>
  </div>
  <div class="gs-pbar"><i id="gsBar" style="width:0%"></i></div>
  <div class="gs-body" id="gsBody"></div>
  <div class="gs-foot" id="gsFoot"></div>
</div>

<!-- TIMER MODAL -->
<div class="modal" id="timerModal">
  <div class="tcard">
    <button class="tclose" id="tClose">×</button>
    <div class="nm" id="tName">Hold</div>
    <div class="dial">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="88" stroke="#2c251c" stroke-width="12" fill="none"/>
        <circle id="tRing" cx="100" cy="100" r="88" stroke="#d9682f" stroke-width="12" fill="none"
          stroke-linecap="round" stroke-dasharray="552.9" stroke-dashoffset="0"/>
      </svg>
      <div class="num"><b id="tDisp">0</b><small>SECONDES</small></div>
    </div>
    <div class="tset">
      <button data-s="10">10s</button>
      <button data-s="20">20s</button>
      <button data-s="30">30s</button>
      <button data-s="45">45s</button>
      <button data-s="60">60s</button>
    </div>
    <div class="tctrl">
      <button class="rs" id="tReset">Reset</button>
      <button class="go" id="tGo">Démarrer</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal" id="confirmModal">
  <div class="ccard">
    <div class="cm-ic" id="cmIc"></div>
    <h3 class="cm-title" id="cmTitle"></h3>
    <p class="cm-msg" id="cmMsg"></p>
    <div class="cm-actions">
      <button class="cm-cancel" id="cmCancel">Annuler</button>
      <button class="cm-ok" id="cmOk">Confirmer</button>
    </div>
  </div>
</div>

<!-- EXERCISE DETAIL MODAL : catégorie + muscles + cues (lecture seule) -->
<div class="modal" id="exModal">
  <div class="excard" id="exDetailBody"></div>
</div>

<!-- ACTIVITÉ LIBRE MODAL : déclarer une activité hors séance -->
<div class="modal" id="actModal">
  <div class="acard">
    <button class="tclose" onclick="closeActivity()" aria-label="Fermer">×</button>
    <h3 class="act-title">Ajouter une activité</h3>
    <label class="act-l">Type
      <select id="actType" onchange="onActType()"></select>
    </label>
    <div id="actFields"></div>
    <label class="act-l">Date
      <input id="actDate" type="date">
    </label>
    <div class="act-actions">
      <button class="act-cancel" onclick="closeActivity()">Annuler</button>
      <button class="act-save" onclick="saveActivity()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- PICK MODAL : choisir une séance perso à placer -->
<div class="modal" id="pickModal">
  <div class="pcard">
    <button class="tclose" id="pickClose" onclick="closePicker()">×</button>
    <h3 class="pick-title">Placer une séance perso</h3>
    <div class="pick-list" id="pickList"></div>
  </div>
</div>

<!-- BUILDER : éditeur de séance perso (plein écran) -->
<div class="bld" id="builder">
  <div class="bld-top">
    <button class="x" onclick="closeBuilder()">×</button>
    <span class="bld-title" id="builderTitle">Nouvelle séance</span>
    <button class="bld-save" onclick="saveBuilder()">Enregistrer</button>
  </div>
  <div class="bld-body" id="builderBody"></div>
</div>

<nav class="tabs">
  <button class="on" data-v="cal"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Calendrier</button>
  <button data-v="day"><svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Séance</button>
  <button data-v="log"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Journal</button>
  <button data-v="stats"><svg viewBox="0 0 24 24"><path d="M3 20h18"/><path d="M6 20v-7M12 20V5M18 20v-10"/></svg>Stats</button>
  <button data-v="cust"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>Perso</button>
</nav>

<input type="file" id="importFile" accept="application/json,.json" style="display:none">

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
